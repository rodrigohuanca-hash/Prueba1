<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MusicFlow App</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121212">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar sticky-top p-3">
        <div class="container-fluid">
            <span class="navbar-brand fw-bold text-success"><i class="bi bi-vinyl-fill me-2"></i>MusicFlow</span>
            <button class="btn btn-sm btn-outline-success rounded-pill" data-bs-toggle="modal" data-bs-target="#playlistModal">
                <i class="bi bi-music-note-list"></i> <span id="cart-count" class="badge bg-success ms-1">0</span>
            </button>
        </div>
    </nav>

    <div class="container mt-3">
        <input type="text" id="buscador" class="form-control search-box mb-4" placeholder="Buscar música..." onkeyup="filtrar()">
        <div class="row gx-2 gy-3" id="contenedor-productos"></div>
    </div>

    <div class="player-bar" onclick="togglePlay()">
        <div class="d-flex align-items-center overflow-hidden" style="flex: 1;">
            <img id="current-img" src="https://via.placeholder.com/45" class="rounded me-3" width="45">
            <div class="text-truncate">
                <div id="current-title" class="fw-bold small text-truncate">Sin reproducir</div>
                <div id="current-artist" class="text-secondary" style="font-size: 0.75rem;">Elige una canción</div>
            </div>
        </div>
        <div class="d-flex align-items-center">
            <i class="bi bi-play-circle-fill btn-play-sm" id="btn-master-play"></i>
        </div>
    </div>

    <div class="modal fade" id="playlistModal" tabindex="-1">
        <div class="modal-dialog modal-fullscreen-sm-down">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title fw-bold text-success">Mi Playlist</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="lista-carrito"></div>
                </div>
            </div>
        </div>
    </div>

    <audio id="audio-player"></audio>
    <div id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
